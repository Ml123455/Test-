<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Via Ferrata France — Trip Aventure</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin:0; padding:0; font-family:system-ui,sans-serif; }
  #map { width:100vw; height:100vh; }
  .legend { background:white; padding:8px 12px; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.15); font-size:13px; line-height:1.8; }
  .legend b { display:block; margin-bottom:4px; font-size:14px; }
  .info-popup { font-size:13px; max-width:220px; }
  .info-popup h3 { margin:0 0 4px; font-size:14px; }
  .info-popup .stars { color:#f5a623; }
  .info-popup .detail { color:#555; font-size:11px; margin-top:3px; }
  .leaflet-popup-content-wrapper { border-radius:8px; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([44.6, 5.5], 7);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

// ==============================
// 🧗 VIA FERRATA
// ==============================
const ferrataIcon = L.divIcon({
  html: '<div style="background:#e74c3c;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3);">🧗</div>',
  iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-14]
});

const ferratas = [
  {name:"Via Ferrata du Diable (Aussois)", lat:45.2300, lon:6.7400, note:"★ 7 parcours F→TD, 3760m — + longue de France", avis:"4.7/5, 380+ avis", detail:"Les 7 tronçons autour du Pont du Diable — gorges de l'Arc"},
  {name:"Via Ferrata Rocher Saint-Julien", lat:44.2750, lon:5.2750, note:"★ 4 parcours, vue Ventoux", avis:"4.5/5 · 200+ avis", detail:"Buis-les-Baronnies, Drôme provençale — face Nord"},
  {name:"Via Ferrata Gorges du Verdon", lat:43.7800, lon:6.3420, note:"★ Trou du Renard + Tyrolienne", avis:"4.6/5", detail:"200m au-dessus du Verdon — via cordata avec tyrolienne"},
  {name:"Via Ferrata du Fenouillèdes", lat:42.8080, lon:2.5100, note:"★ 4.8/5 · 1900+ avis", avis:"Top St-Paul-de-Fenouillet", detail:"Ambiance cathare, passerelles — Oxygen Aventure"},
  {name:"Via Ferrata Pont du Diable (Thueyts)", lat:44.6697, lon:4.2202, note:"★ Pont du Diable Ardèche", avis:"4.5/5 · 150+ avis", detail:"Basalte et rivière — via ferrata spectaculaire"},
  {name:"Via Ferrata de Bavella", lat:41.7540, lon:9.1810, note:"★ Aiguilles de Bavella", avis:"4.6/5 · 180+ avis", detail:"Granit rouge mythique, ponts de singe, rappels"},
  {name:"Via Ferrata Lac de Nino", lat:42.3500, lon:8.9100, note:"★ 4.7/5 · 385 avis AllTrails", avis:"#1 via ferrata France", detail:"Corse GR20, pozzines d'altitude"},
  {name:"Via Ferrata Aiguillette du Lauzet", lat:44.7800, lon:6.4300, note:"★ 4.5/5 · 11 avis", avis:"Spot #1 Écrins", detail:"Parc National des Écrins — ambiance minérale"},
  {name:"Via Ferrata Canyons de Lantosque", lat:43.9700, lon:7.3100, note:"★ 3h30, passerelle 16m", avis:"Top PACA", detail:"Ambiance aérienne et minérale, passerelle"},
  {name:"Via Ferrata de la Bastille", lat:45.1920, lon:5.7240, note:"★ Grenoble — vue ville", avis:"4.3/5", detail:"Accessible facilement, panorama Grenoble"},
  {name:"Via Ferrata Gorges de Sarenne", lat:45.0900, lon:6.0200, note:"★ Alpe d'Huez / Oisans", avis:"4.4/5", detail:"Vue imprenable sur l'Oisans, parcours sportif"},
  {name:"Via Ferrata Gorges de la Dourbie", lat:44.0980, lon:3.0700, note:"★ Millau — canoë + ferrata", avis:"4.3/5", detail:"Gorges du Tarn, activités combinées canoë"},
];

ferratas.forEach(f => {
  const popup = `<div class="info-popup">
    <h3>🧗 ${f.name}</h3>
    <div class="stars">${f.note}</div>
    <span>${f.avis}</span>
    <div class="detail">📍 ${f.detail}</div>
    <div style="margin-top:4px"><a href="https://www.google.com/maps?q=${f.lat},${f.lon}" target="_blank">🗺️ Ouvrir dans Maps</a></div>
  </div>`;
  L.marker([f.lat, f.lon], {icon: ferrataIcon}).bindPopup(popup).addTo(map);
});

// ==============================
// 🏔️ POINTS DE VUE
// ==============================
const vueIcon = L.divIcon({
  html: '<div style="background:#3498db;color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3);">🏔️</div>',
  iconSize: [24,24], iconAnchor: [12,12], popupAnchor: [0,-12]
});

const vues = [
  {name:"Route des Crêtes (La Palud)", lat:43.7800, lon:6.3450, detail:"Boucle 25km — 14 belvédères sur le Grand Canyon du Verdon", avis:"4.5/5 · 777 avis AllTrails"},
  {name:"Forts de l'Esseillon / Pont du Diable", lat:45.2284, lon:6.7350, detail:"Vue sur méandres de l'Arc et défilés rocheux", avis:"4.6/5"},
  {name:"Col de Bavella (1218m)", lat:41.7900, lon:9.2000, detail:"Vue 360° sur les aiguilles de granit rouge", avis:"4.7/5 · 500+ avis"},
  {name:"Table d'orientation de la Sapée", lat:44.2000, lon:6.3000, detail:"Panorama 360° Mercantour + Provence", avis:"4.4/5"},
  {name:"Sommet du Ventoux (depuis Buis)", lat:44.1740, lon:5.2780, detail:"Toit de la Provence, vue de l'autre côté de la ferrata", avis:"4.6/5"},
];

vues.forEach(v => {
  const popup = `<div class="info-popup">
    <h3>🏔️ ${v.name}</h3>
    <span>${v.avis}</span>
    <div class="detail">${v.detail}</div>
    <div style="margin-top:4px"><a href="https://www.google.com/maps?q=${v.lat},${v.lon}" target="_blank">🗺️ Ouvrir dans Maps</a></div>
  </div>`;
  L.marker([v.lat, v.lon], {icon: vueIcon}).bindPopup(popup).addTo(map);
});

// ==============================
// 🏊 BAIGNADE / RIVIÈRES / CASCADES
// ==============================
const eauIcon = L.divIcon({
  html: '<div style="background:#1abc9c;color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3);">🏊</div>',
  iconSize: [24,24], iconAnchor: [12,12], popupAnchor: [0,-12]
});

const eauSpots = [
  {name:"Gorges de Galamus", lat:42.8360, lon:2.4750, type:"🌊 Canyon baignade", detail:"4.8/5 · 5075 avis Google — Agly, canyon calcaire blanc/rose", avis:"🔝 Spot #1 Pyrénées-Orientales"},
  {name:"Lac de Castillon", lat:43.9050, lon:6.4700, type:"🏖️ Lac alpin", detail:"Baignade, pédalo, plages — proche Castellane/Verdon", avis:"4.5/5"},
  {name:"Saut du Loup", lat:43.7700, lon:6.3500, type:"💧 Cascade + baignade", detail:"Verdon — cascade accessible avec bassin naturel", avis:"4.4/5"},
  {name:"Piscines naturelles du Cavu", lat:41.7350, lon:9.2350, type:"🏊 Vasques émeraude", detail:"Cavu + Purcaraccia — vasques granit Corse Sud", avis:"4.7/5 · 400+ avis"},
  {name:"Gorges de la Fou", lat:42.8150, lon:2.4820, type:"🌊 Faille rivière", detail:"200m de faille creusée par la rivière, proche St-Paul", avis:"4.6/5"},
  {name:"Lac de Nino", lat:42.3500, lon:8.9100, type:"🏔️ Lac d'altitude", detail:"Pozzines GR20, 1743m — rando+paysage unique", avis:"4.7/5 · 385 avis"},
];

eauSpots.forEach(s => {
  const popup = `<div class="info-popup">
    <h3>🏊 ${s.name}</h3>
    <div class="stars">${s.type}</div>
    <span>${s.avis}</span>
    <div class="detail">${s.detail}</div>
    <div style="margin-top:4px"><a href="https://www.google.com/maps?q=${s.lat},${s.lon}" target="_blank">🗺️ Ouvrir dans Maps</a></div>
  </div>`;
  L.marker([s.lat, s.lon], {icon: eauIcon}).bindPopup(popup).addTo(map);
});

// ==============================
// 🍽️ RESTAURANTS
// ==============================
const restoIcon = L.divIcon({
  html: '<div style="background:#f39c12;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3);">🍽️</div>',
  iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-11]
});

const restos = [
  {name:"Le Relais des Corbières", lat:42.8166, lon:2.5010, detail:"4.2/5 · 260 avis — #1 TripAdvisor St-Paul", avis:"Bonne cuisine locale, terrasse ombragée"},
  {name:"Mas Peyre", lat:42.8170, lon:2.5030, detail:"4.8/5 · 45 avis — #2 local St-Paul", avis:"Cuisine locale raffinée"},
  {name:"Auberge des Crêtes", lat:43.7810, lon:6.3440, detail:"3.5/5 · 59 avis — terrasse canyon", avis:"Site touristique + mets qualité, vue canyon"},
  {name:"Restaurant Aiguines", lat:43.7740, lon:6.2430, detail:"Cuisine provençale vue lac", avis:"Au bord du lac de Sainte-Croix"},
  {name:"Auberge de Zonza", lat:41.7520, lon:9.1700, detail:"Spécialités corses, charcuterie AOC", avis:"Au pied des Aiguilles de Bavella"},
];

restos.forEach(r => {
  const popup = `<div class="info-popup">
    <h3>🍽️ ${r.name}</h3>
    <span>${r.detail}</span>
    <div class="detail">${r.avis}</div>
    <div style="margin-top:4px"><a href="https://www.google.com/maps?q=${r.lat},${r.lon}" target="_blank">🗺️ Ouvrir dans Maps</a></div>
  </div>`;
  L.marker([r.lat, r.lon], {icon: restoIcon}).bindPopup(popup).addTo(map);
});

// ==============================
// 🎉 BOÎTES DE NUIT
// ==============================
const clubIcon = L.divIcon({
  html: '<div style="background:#9b59b6;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3);">🎉</div>',
  iconSize: [22,22], iconAnchor: [11,11], popupAnchor: [0,-11]
});

const clubs = [
  {name:"L'Uba Club", lat:42.6990, lon:2.8940, city:"Perpignan", detail:"Boîte emblématique 20+ ans — centre-ville", avis:"4.2/5"},
  {name:"Playa Club", lat:42.7050, lon:2.8950, city:"Perpignan", detail:"Ambiance « nuit de folie » — DJ sets", avis:"4.0/5"},
  {name:"Le Speakeasy", lat:42.6980, lon:2.8910, city:"Perpignan", detail:"Cocktails originaux + balançoires — ambiance cosy", avis:"4.3/5"},
  {name:"Hôtel Vauban — Night", lat:44.8990, lon:6.6430, city:"Briançon", detail:"Bar/club principal Hautes-Alpes", avis:"3.8/5"},
];

clubs.forEach(c => {
  const popup = `<div class="info-popup">
    <h3>🎉 ${c.name}</h3>
    <span>📍 ${c.city} · ${c.avis}</span>
    <div class="detail">${c.detail}</div>
    <div style="margin-top:4px"><a href="https://www.google.com/maps?q=${c.lat},${c.lon}" target="_blank">🗺️ Ouvrir dans Maps</a></div>
  </div>`;
  L.marker([c.lat, c.lon], {icon: clubIcon}).bindPopup(popup).addTo(map);
});

// ==============================
// LÉGENDE
// ==============================
const legend = L.control({position: 'bottomright'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `<b>Légende</b>
    🧗 Via Ferrata (12)<br>
    🏔️ Point de vue (5)<br>
    🏊 Rivière / Cascade / Baignade (6)<br>
    🍽️ Restaurant Q/P (5)<br>
    🎉 Boîte de nuit (4)<br>
    <small style="color:#888">Coords approx. — ouvrir Maps pour précis</small>`;
  return div;
};
legend.addTo(map);

// ==============================
// CLUSTER VISUEL — cercles sur les 3 hubs
// ==============================
const hubs = [
  {name:"Hub Pyrénées-Orientales", lat:42.82, lon:2.50, radius:30000},
  {name:"Hub Verdon", lat:43.80, lon:6.40, radius:28000},
  {name:"Hub Alpes Maurienne", lat:45.10, lon:6.50, radius:35000},
  {name:"Hub Corse-Bavella", lat:41.85, lon:9.15, radius:25000},
];

hubs.forEach(h => {
  L.circle([h.lat, h.lon], {
    color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.05,
    radius: h.radius, weight: 1, dashArray: '5,10'
  }).bindTooltip(h.name, {permanent:false, direction:'center'}).addTo(map);
});

// Note méthodologique
console.log('Carte générée via Overpass OSM + web_search cross-ref. Coordonnées approximatives (centres de commune/zone). Pour précision GPS : ouvrir lien Maps dans chaque popup.');
</script>

<div style="position:fixed;top:10px;left:10px;background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.2);z-index:1000;font-size:13px;max-width:280px;">
  <b style="font-size:15px;">🗺️ Trip Via Ferrata France</b><br>
  <small style="color:#888;">12 ferratas · hors Bretagne</small><br>
  <small style="color:#c0392b;">🔄 En attente Google Places API pour notes/lat-long précis</small><br>
  <small style="color:#888;">Coordonnées : centres communaux OSM</small>
</div>

</body>
</html>
