<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contactez Marius Lagrue — BotArmory. Site web pour artisans en 48h. Devis gratuit, paiement après validation.">
<title>Contact — BotArmory | Devis site artisan gratuit</title>
<meta property="og:title" content="Contact — BotArmory">
<meta property="og:description" content="Recevez un devis pour votre site d'artisan. Réponse sous 24h.">
<meta property="og:url" content="https://botarmory.com/contact.html">
<meta property="og:type" content="website">

<link rel="canonical" href="https://botarmory.com/contact.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.contact-form{max-width:460px;margin:0 auto;text-align:left}
.form-row{display:flex;gap:10px;margin-bottom:10px}
.contact-form input,.contact-form textarea{width:100%;padding:13px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
.contact-form input:focus,.contact-form textarea:focus{border-color:var(--accent)}
.contact-form textarea{resize:vertical;min-height:80px;margin-bottom:12px}
.contact-form button{display:block;width:100%;background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px;border-radius:var(--r);border:none;cursor:pointer;font-family:inherit;transition:background .2s;box-shadow:0 2px 12px rgba(79,70,229,.1)}
.contact-form button:hover{background:var(--accent2)}
.form-note{text-align:center;font-size:11px;color:var(--text4);margin-top:12px}
@media(max-width:768px){.form-row{flex-direction:column;gap:10px}}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">BOT<span>ARMORY</span></a>
  <div class="nav-links">
    <a href="/exemples.html">Exemples</a>
    <a href="/tarifs.html">1090€</a>
    <a href="/contact.html" class="nav-cta">Démarrer</a>
  </div>
</nav>

<div class="cta-section" style="padding-top:100px">
  <h2>Prêt à avoir un vrai site ?</h2>
  <p>Remplissez ce formulaire. Je vous réponds dans la journée avec un devis personnalisé.</p>
  <form action="https://formspree.io/f/mjgqprkr" method="POST" class="contact-form" style="margin-top:32px">
    <div class="form-row"><input type="text" name="name" placeholder="Votre nom" required><input type="email" name="email" placeholder="Votre email" required></div>
    <div class="form-row"><input type="text" name="metier" placeholder="Votre métier"><input type="text" name="ville" placeholder="Votre ville"></div>
    <textarea name="message" placeholder="Parlez-moi de votre activité... (facultatif)" rows="3"></textarea>
    <button type="submit">Recevoir un devis →</button>
    <p class="form-note">🔒 Réponse sous 24h · Paiement après validation · Aucun engagement</p>
  </form>
</div>

<footer class="footer">
  <span>© 2026 BotArmory — Marius Lagrue</span>
  <div class="footer-links">
    <a href="/mentions-legales.html">Mentions légales</a>
    <a href="/cgv.html">CGV</a>
    <a href="/contact.html">Contact</a>
  </div>
</footer>
</body>
</html>
