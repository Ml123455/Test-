<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#0d1117; color:#c9d1d9; display:flex; min-height:100vh; }
.left { width:400px; background:#161b22; padding:20px; overflow-y:auto; flex-shrink:0; border-right:1px solid #21262d; }
.right { flex:1; display:flex; flex-direction:column; }
#map { flex:1; min-height:400px; }
.preview { background:#161b22; max-height:420px; overflow-y:auto; border-top:2px solid #f78166; }
.preview-inner { padding:12px; }
label { display:block; margin:9px 0 3px; font-size:.68em; text-transform:uppercase; letter-spacing:.06em; color:#8b949e; }
input, select { width:100%; padding:8px 10px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:.82em; transition:border-color .15s; }
input:focus, select:focus { outline:none; border-color:#f78166; box-shadow:0 0 0 3px rgba(247,129,102,.15); }
.btn { display:block; width:100%; margin-top:14px; padding:11px; background:linear-gradient(135deg,#f78166,#d65c3a); color:#fff; border:none; border-radius:6px; font-weight:600; font-size:.92em; cursor:pointer; transition:opacity .15s; }
.btn:hover { opacity:.9; }
.btn-sm { padding:6px 12px; font-size:.7em; border-radius:4px; border:1px solid #30363d; background:#21262d; color:#8b949e; cursor:pointer; margin-top:4px; }
.btn-sm:hover { background:#30363d; color:#c9d1d9; }
h2 { font-size:1em; margin-bottom:4px; color:#f78166; font-weight:600; }
.budget-line { display:flex; justify-content:space-between; padding:3px 8px; border-bottom:1px solid #21262d; font-size:.76em; }
.budget-line.total { font-weight:700; color:#f78166; font-size:.88em; background:#1a1f2b; border-radius:4px; margin-top:2px; border:none; }
.budget-line.over { color:#ff4444; }
.day-card { background:#0d1117; margin:5px 8px; border-radius:8px; overflow:hidden; border:1px solid #21262d; }
.day-card-header { display:flex; align-items:center; padding:5px 10px; gap:6px; font-size:.75em; font-weight:600; border-bottom:1px solid #21262d; }
.day-card-body { display:flex; gap:10px; padding:8px 10px; }
.day-card-img { width:105px; height:75px; border-radius:6px; object-fit:cover; flex-shrink:0; background:#1a1f2b; border:1px solid #21262d; }
.day-card-info { flex:1; font-size:.73em; line-height:1.65; }
.day-card-info .act-line { display:flex; justify-content:space-between; }
.day-card-info .act-line .price { color:#8b949e; font-size:.9em; }
.day-card-nuit { margin-top:2px; padding-top:2px; border-top:1px solid #21262d; font-size:.85em; color:#8b949e; }
.hero-img-wrap { position:relative; margin:0 8px 8px 8px; border-radius:10px; overflow:hidden; height:170px; }
.hero-img { width:100%; height:100%; object-fit:cover; }
.hero-overlay { position:absolute; bottom:0; left:0; right:0; padding:22px 14px 12px; background:linear-gradient(transparent,rgba(0,0,0,.8)); }
.hero-overlay b { font-size:1em; color:#fff; display:block; }
.hero-overlay span { font-size:.75em; color:#ccc; }
.info { font-size:.7em; color:#8b949e; margin-top:4px; min-height:1.2em; }
.spinner { display:inline-block; width:13px; height:13px; border:2px solid #f78166; border-top-color:transparent; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-left:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
.etape-row { display:flex; gap:6px; align-items:center; }
.etape-row input { flex:1; }
.etape-row .btn-sm { flex-shrink:0; }
#etapes-list { margin-top:4px; }
.etape-tag { display:inline-flex; align-items:center; gap:4px; background:#21262d; padding:2px 8px; border-radius:12px; font-size:.7em; margin:2px 3px; }
.etape-tag .remove { cursor:pointer; color:#f85149; font-weight:bold; margin-left:2px; }

<script>
// ============================================================
// STATE
// ============================================================
let map, markers=[], routeLayers=[];
let etapes = [];
let itineranceMode = 'itin';
let currentBudget = 400;

// ============================================================
// MAP
// ============================================================
function initMap() {
  if (map) { map.remove(); markers=[]; routeLayers=[]; }
  map = L.map('map').setView([46.5, 3.5], 6);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:18, attribution:'&copy; OSM'}).addTo(map);
  map.on('click', e => {
    if (window._addingStop) {
      addEtapeAt(e.latlng.lat, e.latlng.lng);
      window._addingStop = false;
      document.body.style.cursor = 'default';
    }
  });
}
initMap();

function mI(emoji, bg, s) {
  return L.divIcon({html:`<div style="background:${bg};color:#fff;border-radius:50%;width:${s}px;height:${s}px;display:flex;align-items:center;justify-content:center;font-size:${s*0.45}px;border:2px solid #0d1117;box-shadow:0 2px 8px rgba(0,0,0,.5)">${emoji}</div>`,iconSize:[s,s],iconAnchor:[s/2,s/2],popupAnchor:[0,-s/2]});
}

// ============================================================
// ETAPES
// ============================================================
function setMode(m) {
  itineranceMode = m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===m));
}

function onBudgetChange() {
  currentBudget = parseInt(document.getElementById('budget').value);
}

function addEtape() {
  const inp = document.getElementById('etape-input');
  const name = inp.value.trim();
  if (!name) return;
  etapes.push({name, lat: null, lon: null});
  inp.value = '';
  renderEtapes();
}

async function addEtapeAt(lat, lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=10`);
    const d = await r.json();
    const name = d.address?.city || d.address?.town || d.address?.village || 'Point carte';
    etapes.push({name, lat, lng});
  } catch(e) {
    etapes.push({name:'Point carte', lat, lng});
  }
  renderEtapes();
}

function removeEtape(i) { etapes.splice(i,1); renderEtapes(); }
function renderEtapes() {
  document.getElementById('etapes-list').innerHTML = etapes.map((e,i) =>
    `<span class="etape-tag">📍 ${e.name} <span class="remove" onclick="removeEtape(${i})">×</span></span>`
  ).join('');
}

// ============================================================
// GEOCODING & ROUTING
// ============================================================
async function geocode(q) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' France')}&format=json&limit=1`);
    await new Promise(r2=>setTimeout(r2,1100));
    const d = await r.json();
    if (d.length) return {lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon), name:d[0].display_name.split(',')[0]};
  } catch(e) {}
  return null;
}

async function getRouteOSRM(waypoints) {
  try {
    const coords = waypoints.map(w => `${w.lon},${w.lat}`).join(';');
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?geometries=geojson&overview=full`);
    const d = await r.json();
    if (!d.routes || !d.routes.length) return null;
    return {km:Math.round(d.routes[0].distance/1000), geom:d.routes[0].geometry};
  } catch(e) { return null; }
}

// ============================================================
// REGION DETECTION
// ============================================================
function detectRegion(lat, lon) {
  if (lon < -1.5 && lat > 47 && lat < 49) return 'bretagne';        // Bretagne
  if (lon < -1 && lat > 49 && lat < 50.5) return 'normandie';       // Normandie
  if (lon > -2 && lon < 0 && lat > 44 && lat < 47) return 'aquitaine'; // Côte Aquitaine
  if (lat > 43 && lat < 44.5 && lon > 3 && lon < 7.5) return 'med';    // Méditerranée
  if (lat > 42.3 && lat < 43 && lon > 2.5 && lon < 7.5) return 'med';  // Côte Vermeille/Roussillon
  if (lat > 44.5 && lat < 46 && lon < -1) return 'aquitaine';       // Landes
  if (lat > 44.5 && lon > 6) return 'alpes';                         // Alpes
  if (lat > 42.5 && lat < 43.5 && lon > -2 && lon < 2) return 'pyrenees'; // Pyrénées
  if (lat > 45 && lon > 4 && lon < 6 && lat < 46) return 'alpes';   // Préalpes
  if (lat > 44 && lat < 46 && lon > 2 && lon < 5) return 'massif';  // Massif Central
  if (lat > 47 && lat < 49 && lon > 5 && lon < 8) return 'vosges';  // Vosges/Jura
  if (lat > 46 && lat < 47.5 && lon > 5.5 && lon < 7) return 'jura'; // Jura
  return 'campagne';                                                  // Campagne/plaine
}

// ============================================================
// OVERPASS API — REAL CAMPINGS
// ============================================================
async function fetchRealCampings(lat, lon, radius=30000) {
  const query = `[out:json];node["tourism"="camp_site"](around:${radius},${lat},${lon});out 5;`;
  try {
    const r = await fetch('https://overpass-api.de/api/interpreter', {method:'POST', body:query});
    const d = await r.json();
    return d.elements.map(e => e.tags.name || 'Camping sans nom').filter(n => n !== 'Camping sans nom').slice(0,3);
  } catch(e) { return []; }
}

// ============================================================
// WIKIPEDIA IMAGE FETCH
// ============================================================
const imageCache = {};
async function fetchCityImage(cityName) {
  let clean = cityName.replace(/^(En route|Étape|proche|Départ)\s*/i, '').trim();
  if (!clean || clean.match(/^\d+$/)) return null;
  if (imageCache[clean]) return imageCache[clean];

  const queries = [clean, clean+' France', clean.replace(/\s*\(.*\)/,'').trim()];
  for (const q of queries) {
    try {
      const r = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
      if (!r.ok) continue;
      const d = await r.json();
      let url = null;
      if (d.originalimage?.source) url = d.originalimage.source;
      else if (d.thumbnail?.source) url = d.thumbnail.source.replace(/\/\d+px-/, '/800px-');
      if (url) { imageCache[clean]=url; return url; }
    } catch(e) { continue; }
  }
  imageCache[clean]=null; return null;
}

async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`);
    await new Promise(r2=>setTimeout(r2,1100));
    const d = await r.json();
    return d.address?.city || d.address?.town || d.address?.village || d.address?.municipality || '';
  } catch(e) { return ''; }
}

// ============================================================
// BUDGET SCALING LOGIC
// ============================================================
function getBudgetMultiplier(budget) {
  // Returns a multiplier that determines how many activities and which tier
  if (budget <= 200) return { multiplier: 0.6, tier: 'low', actsPerDay: 1 };
  if (budget <= 300) return { multiplier: 0.75, tier: 'low', actsPerDay: 1.5 };
  if (budget <= 400) return { multiplier: 0.9, tier: 'mid', actsPerDay: 2 };
  if (budget <= 500) return { multiplier: 1.0, tier: 'mid', actsPerDay: 2.5 };
  if (budget <= 800) return { multiplier: 1.0, tier: 'high', actsPerDay: 3 };
  return { multiplier: 1.0, tier: 'high', actsPerDay: 3.5 };
}

function pickActs(region, type, budgetTier, count) {
  const data = ACTIVITIES[region] || ACTIVITIES['campagne'];
  let pool = [];

  if (type === 'eau') {
    pool = [...data.low.filter(a=>a.n.toLowerCase().includes('kayak')||a.n.toLowerCase().includes('baignade')||a.n.toLowerCase().includes('snorkel')||a.n.toLowerCase().includes('plongée')||a.n.toLowerCase().includes('voile')||a.n.toLowerCase().includes('surf')||a.n.toLowerCase().includes('paddle')||a.n.toLowerCase().includes('char')), ...data.mid.filter(a=>a.n.toLowerCase().includes('kayak')||a.n.toLowerCase().includes('rafting')||a.n.toLowerCase().includes('canyoning')||a.n.toLowerCase().includes('plongée')||a.n.toLowerCase().includes('voile')||a.n.toLowerCase().includes('surf'))];
  } else if (type === 'montagne') {
    pool = [...data.low.filter(a=>a.n.toLowerCase().includes('rando')||a.n.toLowerCase().includes('lac')), ...data.mid.filter(a=>a.n.toLowerCase().includes('escalade')||a.n.toLowerCase().includes('via ferrata')||a.n.toLowerCase().includes('vtt')||a.n.toLowerCase().includes('rando'))];
  } else if (type === 'adrenaline') {
    pool = [...data.mid.filter(a=>a.p >= 30), ...data.high];
  } else if (type === 'chill') {
    pool = [...data.low, ...data.mid.filter(a=>a.p < 30)];
  } else {
    pool = [...data.low, ...data.mid, ...(budgetTier==='high'?data.high:[])];
  }

  // Deduplicate by name
  const seen = new Set();
  pool = pool.filter(a => { if(seen.has(a.n)) return false; seen.add(a.n); return true; });

  const shuffled = [...pool].sort(()=>Math.random()-.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

// ============================================================
// MAIN GENERATE FUNCTION
// ============================================================
async function generate() {
  const statusEl = document.getElementById('status');
  statusEl.innerHTML = '🔄 Génération en cours<span class="spinner"></span>';
  document.getElementById('budget-preview').innerHTML = '';

  const departName = document.getElementById('depart').value.trim()||'Bonnelles';
  const destName = document.getElementById('dest').value.trim()||'Cassis';
  const jours = parseInt(document.getElementById('jours').value);
  const pers = parseInt(document.getElementById('pers').value);
  const budget = parseInt(document.getElementById('budget').value);
  const type = document.getElementById('type').value;
  const heberg = document.getElementById('heberg').value;
  currentBudget = budget;

  // Geocode all waypoints
  const depart = await geocode(departName);
  if (!depart) { statusEl.textContent='❌ Départ introuvable'; return; }
  const dest = await geocode(destName);
  if (!dest) { statusEl.textContent='❌ Destination introuvable'; return; }

  const waypoints = [depart];
  for (const e of etapes) {
    const g = await geocode(e.name);
    if (g) waypoints.push(g);
  }
  waypoints.push(dest);

  // Route
  const route = await getRouteOSRM(waypoints);
  if (!route) { statusEl.textContent='❌ Pas de route trouvée'; return; }

  statusEl.innerHTML = `✅ ${waypoints.map(w=>w.name).join(' → ')} · ${route.km} km`;
  statusEl.style.color = '#3fb950';

  // Budget scaling
  const bm = getBudgetMultiplier(budget);
  const region = detectRegion(dest.lat, dest.lon);

  // ---- PLAN DAYS ----
  let days = [];
  const coords = route.geom.coordinates;

  if (itineranceMode === 'itin') {
    // Every day a new spot
    const nStops = Math.min(jours, waypoints.length * 3);
    const segment = Math.floor(coords.length / Math.max(nStops - 1, 1));
    for (let j = 1; j <= jours; j++) {
      let idx, dayName;
      if (j === 1) { idx = 0; dayName = depart.name; }
      else if (j === jours) { idx = coords.length - 1; dayName = dest.name; }
      else { idx = Math.floor(segment * (j - 0.5)); dayName = `Étape ${j}`; }

      const c = coords[Math.min(idx, coords.length-1)];
      const lat = c[1], lon = c[0];
      const nActs = Math.max(1, Math.round(bm.actsPerDay * (0.7 + Math.random()*0.6)));
      const acts = pickActs(region, type, bm.tier, nActs);
      let nightCost=0, nightLabel='', nightName='';
      if (heberg==='bivouac'||(heberg==='mixte'&&j===1)) {
        nightLabel='Bivouac'; nightCost=0;
        const bivSpots = (ACTIVITIES[region]||ACTIVITIES['campagne']).bivouac||['Forêt domaniale'];
        nightName = bivSpots[Math.floor(Math.random()*bivSpots.length)];
      } else {
        nightLabel='Camping'; nightCost=14;
        nightName = '';
      }
      days.push({day:j, name:dayName, lat, lon, acts, nightLabel, nightCost, nightName});
    }
  } else if (itineranceMode === 'semi') {
    // 2-3 days per spot
    const spotsNeeded = Math.ceil(jours / 2.5);
    const segment = Math.floor(coords.length / Math.max(spotsNeeded, 1));
    for (let j = 1; j <= jours; j++) {
      const spotIdx = Math.floor((j-1) / 2.5);
      const idx = Math.floor(coords.length * (spotIdx / Math.max(spotsNeeded-1, 1)));
      const c = coords[Math.min(idx, coords.length-1)];
      const lat = c[1], lon = c[0];
      let dayName;
      if (j === 1) dayName = depart.name;
      else if (j === jours) dayName = dest.name;
      else dayName = `Zone ${spotIdx+1}`;

      const nActs = Math.max(1, Math.round(bm.actsPerDay * (0.8 + Math.random()*0.4)));
      const acts = pickActs(region, type, bm.tier, nActs);
      let nightCost=0, nightLabel='', nightName='';
      if (heberg==='bivouac'||(heberg==='mixte'&&j===1)) {
        nightLabel='Bivouac'; nightCost=0;
        const bivSpots = (ACTIVITIES[region]||ACTIVITIES['campagne']).bivouac||['Forêt domaniale'];
        nightName = bivSpots[Math.floor(Math.random()*bivSpots.length)];
      } else {
        nightLabel='Camping'; nightCost=14;
        nightName = '';
      }
      days.push({day:j, name:dayName, lat, lon, acts, nightLabel, nightCost, nightName});
    }
  } else {
    // Fixed base
    for (let j = 1; j <= jours; j++) {
      const nActs = Math.max(1, Math.round(bm.actsPerDay * (1.0 + Math.random()*0.3)));
      const acts = pickActs(region, type, bm.tier, nActs);
      let nightCost=0, nightLabel='', nightName='';
      if (heberg==='bivouac') {
        nightLabel='Bivouac'; nightCost=0;
        const bivSpots = (ACTIVITIES[region]||ACTIVITIES['campagne']).bivouac||['Forêt domaniale'];
        nightName = bivSpots[Math.floor(Math.random()*bivSpots.length)];
      } else {
        nightLabel='Camping'; nightCost=14;
        nightName = '';
      }
      days.push({day:j, name:dest.name, lat:dest.lat+(Math.random()-.5)*0.05, lon:dest.lon+(Math.random()-.5)*0.05, acts, nightLabel, nightCost, nightName});
    }
  }

  // ---- FETCH REAL CAMPINGS for main stop(s) ----
  const mainLocs = days.filter(d => d.nightLabel==='Camping').slice(0,3);
  for (const d of mainLocs) {
    const realCamps = await fetchRealCampings(d.lat, d.lon, 25000);
    if (realCamps.length) d.nightName = realCamps[Math.floor(Math.random()*realCamps.length)];
    else {
      const regCamps = (ACTIVITIES[region]||ACTIVITIES['campagne']).camping||[];
      if (regCamps.length) d.nightName = regCamps[Math.floor(Math.random()*regCamps.length)];
    }
  }

  // ---- BUDGET CALC ----
  const kmAR = route.km * 2;
  const coutVoiture = Math.round(kmAR * (7/100 * 1.80 + 0.06)); // essence 7L/100km + péage
  const trajetPP = Math.round(coutVoiture / pers);

  let actTotal = 0;
  days.forEach(d => d.acts.forEach(a => actTotal += a.p));

  let nuitsTotal = 0;
  days.forEach(d => nuitsTotal += d.nightCost);

  const bouffe = jours * 15;
  const total = trajetPP + actTotal + nuitsTotal + bouffe;
  const budgetPct = Math.round(total / budget * 100);

  // Budget bar color
  let barColor = '#3fb950';
  if (budgetPct > 95) barColor = '#f85149';
  else if (budgetPct > 80) barColor = '#d29922';

  document.getElementById('budget-preview').innerHTML = `
    <h2>💰 ${total}€/pers <span style="font-size:.75em;color:${budgetPct > 95 ? '#f85149' : '#8b949e'}">(${budgetPct}% du budget)</span></h2>
    <div class="budget-bar"><div class="budget-bar-fill" style="width:${Math.min(budgetPct,100)}%;background:${barColor}"></div></div>
    <div class="budget-line"><span>⛽🛣️ Trajet A/R (${kmAR} km)</span><span>${trajetPP}€/pers</span></div>
    <div class="budget-line"><span>🎯 ${days.reduce((s,d)=>s+d.acts.length,0)} activités</span><span>${actTotal}€</span></div>
    <div class="budget-line"><span>⛺ Nuits (${heberg})</span><span>${nuitsTotal}€</span></div>
    <div class="budget-line"><span>🍽️ Bouffe (${jours}j × 15€)</span><span>${bouffe}€</span></div>
    <div class="budget-line total"><span>TOTAL / personne</span><span>${total}€</span></div>
  `;

  // ---- FETCH IMAGES ----
  const imgPromises = days.map(async d => {
    let city = d.name;
    if (city.match(/^(Étape\s*\d+|Zone\s*\d+|En route)$/i)) {
      const realCity = await reverseGeocode(d.lat, d.lon);
      if (realCity) city = realCity;
    }
    const img = await fetchCityImage(city);
    return {day:d.day, img};
  });
  const dayImgs = await Promise.all(imgPromises);
  const imgMap = {};
  dayImgs.forEach(di => imgMap[di.day] = di.img);

  const destImg = imgMap[days.length] || await fetchCityImage(dest.name);
  const heroImg = destImg || imgMap[1];

  // ---- RENDER PREVIEW ----
  let html = '';
  if (heroImg) {
    html += `<div class="hero-img-wrap"><img class="hero-img" src="${heroImg}" alt="${dest.name}" loading="lazy" onerror="this.parentElement.style.display='none'">
      <div class="hero-overlay"><b>${depart.name} → ${dest.name}</b><span>${jours} jours · ${pers} pers · ${route.km} km · Mode ${itineranceMode==='itin'?'itinérant':itineranceMode==='semi'?'semi-itinérant':'fixe'}</span></div></div>`;
  } else {
    html += `<div style="padding:0 8px 6px 8px;font-weight:600;">🗺️ ${depart.name} → ${dest.name} · ${jours}j · ${pers} pers</div>`;
  }

  days.forEach(d => {
    const img = imgMap[d.day];
    html += `<div class="day-card">`;
    html += `<div class="day-card-header" style="color:${COLORS[(d.day-1)%COLORS.length]}">📍 J${d.day} — ${d.name}</div>`;
    html += `<div class="day-card-body">`;
    if (img) {
      html += `<img class="day-card-img" src="${img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none'">`;
    } else {
      html += `<div class="day-card-img" style="display:flex;align-items:center;justify-content:center;font-size:1.6em;background:#161b22;">🗺️</div>`;
    }
    html += `<div class="day-card-info">`;
    d.acts.forEach(a => {
      html += `<div class="act-line"><span>${a.e} ${a.n}</span><span class="price">${a.p}€</span></div>`;
      if (a.desc) html += `<span style="font-size:.85em;color:#6e7681;display:block;">  ↳ ${a.desc}</span>`;
    });
    let nuitDetail = `${d.nightLabel}`;
    if (d.nightName) nuitDetail += ` · ${d.nightName}`;
    if (d.nightCost) nuitDetail += ` · ${d.nightCost}€`;
    else nuitDetail += ' · gratuit';
    html += `<div class="day-card-nuit">⛺ ${nuitDetail}</div>`;
    html += `</div></div></div>`;
  });

  document.getElementById('trip-preview').innerHTML = html;

  // ---- MAP ----
  markers.forEach(m => map.removeLayer(m));
  routeLayers.forEach(l => map.removeLayer(l));
  markers = []; routeLayers = [];

  L.geoJSON(route.geom, {style:{color:'#f78166',weight:3,opacity:.5,dashArray:'8,6'}}).addTo(map);

  markers.push(L.marker([depart.lat, depart.lon], {icon: mI('🚗','#f78166',28)})
    .bindPopup(`<b>🚗 DÉPART</b><br>${departName}`).addTo(map));

  // Waypoint markers
  for (let i=1; i<waypoints.length-1; i++) {
    markers.push(L.marker([waypoints[i].lat, waypoints[i].lon], {icon: mI('📍','#d2a850',22)})
      .bindPopup(`<b>📍 Étape</b><br>${waypoints[i].name}`).addTo(map));
  }

  days.forEach(d => {
    const c = COLORS[(d.day-1)%COLORS.length];
    const img = imgMap[d.day];
    let popupContent = `<b>J${d.day} — ${d.name}</b><br>`;
    d.acts.forEach(a => popupContent += `${a.e} ${a.n} (${a.p}€)<br>`);
    popupContent += `⛺ ${d.nightLabel}`;
    if (d.nightName) popupContent += ` · ${d.nightName}`;
    if (img) popupContent += `<br><img src="${img}" style="width:180px;border-radius:6px;margin-top:6px" loading="lazy">`;
    markers.push(L.marker([d.lat, d.lon], {icon: mI(d.day.toString(),c,24)})
      .bindPopup(popupContent, {maxWidth:230}).addTo(map));
  });

  map.fitBounds([[depart.lat,depart.lon],[dest.lat,dest.lon]], {padding:[50,50]});
}

const COLORS = ['#f78166','#58a6ff','#d2a850','#3fb950','#bc8cff','#f0883e','#79c0ff','#ff7b72','#56d364','#e3b341'];
onBudgetChange();
</script>
