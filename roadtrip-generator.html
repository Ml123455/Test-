<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Trip Generator PRO — France</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root { --bg:#0d1117; --panel:#161b22; --border:#21262d; --accent:#58a6ff; --gold:#d2a850; --text:#c9d1d9; --muted:#8b949e; --danger:#f85149; --green:#3fb950; --pink:#ff7b72; --purple:#bc8cff; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.left{width:430px;background:var(--panel);padding:12px;overflow-y:auto;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.right{flex:1;display:flex;flex-direction:column}
#map{flex:1;min-height:350px}
.preview{background:var(--panel);max-height:430px;overflow-y:auto;border-top:2px solid var(--accent)}
.preview-inner{padding:8px}
label{font-size:.66em;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:2px}
input,select{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.77em}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;margin-top:4px;padding:10px;background:linear-gradient(135deg,var(--accent),#1f6feb);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:.86em;cursor:pointer}
.btn:hover{opacity:.88}
.row2{display:flex;gap:6px}.row2>*{flex:1}
.row3{display:flex;gap:5px}.row3>*{flex:1}

/* KIFF */
.kiff-grid{display:flex;gap:5px;margin:2px 0}
.kiff-card{flex:1;padding:6px 4px;background:var(--bg);border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.kiff-card:hover{border-color:var(--accent)}
.kiff-card.active{border-color:var(--accent);background:rgba(88,166,255,.08)}
.kiff-emoji{font-size:1.2em;display:block}
.kiff-name{font-size:.62em;font-weight:600}
.kiff-price{font-size:.55em;color:var(--muted)}

/* PREFERENCES */
.pref-tags{display:flex;gap:3px;flex-wrap:wrap;margin:1px 0}
.pref-tag{padding:2px 7px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:.66em;cursor:pointer;user-select:none}
.pref-tag:hover{border-color:var(--accent)}
.pref-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}

h3{font-size:.78em;color:var(--accent);font-weight:600;margin:3px 0 2px}
.sec-label{font-size:.64em;color:var(--muted);text-transform:uppercase;margin-top:3px}

/* ACTIVITIES */
.cat-toggle{display:flex;align-items:center;gap:3px;padding:3px 5px;background:var(--bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:.68em;font-weight:600}
.cat-toggle:hover{border-color:var(--accent)}
.cat-body{display:none;padding:1px 0 1px 5px}
.cat-body.open{display:block}
.act-item{display:flex;align-items:center;gap:3px;padding:1px 3px;font-size:.68em;cursor:pointer;border-radius:3px}
.act-item:hover{background:rgba(88,166,255,.05)}
.act-item input[type=checkbox]{width:auto;accent-color:var(--accent)}
.act-price{color:var(--muted);font-size:.85em;margin-left:auto}

/* BUDGET */
.budget-bar{height:4px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
.budget-bar-inner{height:100%;border-radius:2px;transition:width .3s}
.budget-line{display:flex;justify-content:space-between;padding:2px 4px;font-size:.7em;border-bottom:1px solid var(--border)}
.budget-line:last-child{border-bottom:none}

/* DAY CARDS */
.day-card{background:var(--bg);margin:3px 4px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.day-card-h{display:flex;align-items:center;padding:4px 8px;gap:6px;font-size:.72em;font-weight:600;border-bottom:1px solid var(--border)}
.day-card-b{display:flex;gap:6px;padding:6px 8px}
.day-img{width:80px;height:58px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#1a1f2b;border:1px solid var(--border)}
.day-info{flex:1;font-size:.68em;line-height:1.5}
.day-sec{margin-top:3px;padding:3px 5px;background:rgba(88,166,255,.04);border-radius:4px;font-size:.95em}
.day-sec.matin{border-left:2px solid var(--gold)}
.day-sec.aprem{border-left:2px solid var(--accent)}
.day-sec.soir{border-left:2px solid var(--purple)}
.day-sec.dodo{border-left:2px solid var(--green)}
.hero-wrap{position:relative;margin:0 4px 5px;border-radius:10px;overflow:hidden;height:130px}
.hero-img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px 10px 6px;background:linear-gradient(transparent,rgba(0,0,0,.9))}
.hero-overlay b{font-size:.85em;color:#fff}

.status{font-size:.64em;color:var(--muted);min-height:1em}
.spinner{display:inline-block;width:10px;height:10px;border:1.5px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-block;padding:1px 4px;border-radius:3px;font-size:.68em;font-weight:600}
.badge-real{background:rgba(63,185,80,.15);color:var(--green)}
.badge-osm{background:rgba(210,168,80,.15);color:var(--gold)}
.badge-fest{background:rgba(188,140,255,.15);color:var(--purple)}
#stepsList span{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-size:.66em;display:inline-flex;align-items:center;gap:2px;margin:1px}
#stepsList span span{cursor:pointer;color:var(--danger);font-weight:bold}
.zone-hint{font-size:.6em;color:var(--gold);margin-top:1px}
.festival-tag{display:inline-block;padding:1px 5px;background:rgba(188,140,255,.1);border:1px solid rgba(188,140,255,.3);border-radius:3px;font-size:.92em;margin:1px}
@media(max-width:768px){body{flex-direction:column}.left{width:100%;max-height:50vh}}
</style>
</head>
<body>

<div class="left">
  <h3>🛣️ ROAD TRIP PRO</h3>

  <!-- KIFF -->
  <div class="sec-label">⚡ Niveau de kiff</div>
  <div class="kiff-grid">
    <div class="kiff-card" data-kiff="1" onclick="setKiff(1)"><span class="kiff-emoji">💸</span><span class="kiff-name">Éco</span><span class="kiff-price">~250€</span></div>
    <div class="kiff-card active" data-kiff="2" onclick="setKiff(2)"><span class="kiff-emoji">😎</span><span class="kiff-name">Cool</span><span class="kiff-price">~400€</span></div>
    <div class="kiff-card" data-kiff="3" onclick="setKiff(3)"><span class="kiff-emoji">🔥</span><span class="kiff-name">Kiff</span><span class="kiff-price">~650€</span></div>
    <div class="kiff-card" data-kiff="4" onclick="setKiff(4)"><span class="kiff-emoji">💎</span><span class="kiff-name">Folie</span><span class="kiff-price">~900€</span></div>
  </div>

  <!-- PREFERENCES -->
  <div class="sec-label">🎯 Environnement</div>
  <div class="pref-tags" id="prefTags">
    <span class="pref-tag active" data-pref="mer" onclick="togglePref(this)">🌊 Mer</span>
    <span class="pref-tag" data-pref="montagne" onclick="togglePref(this)">⛰️ Montagne</span>
    <span class="pref-tag" data-pref="isole" onclick="togglePref(this)">🏞️ Isolé</span>
    <span class="pref-tag" data-pref="festif" onclick="togglePref(this)">🎉 Festif</span>
  </div>

  <!-- DESTINATION + RADIUS -->
  <div class="row2">
    <div><label>📍 Destination</label><input id="dest" value="Cassis" placeholder="Ville ou région"></div>
    <div style="flex:0.5"><label>Rayon exploration</label><select id="radius"><option value="30">30 km</option><option value="50">50 km</option><option value="100" selected>100 km</option><option value="150">150 km</option></select></div>
  </div>

  <!-- DATES -->
  <div class="sec-label">📅 Dates du séjour</div>
  <div class="row2">
    <div><label>Départ</label><input type="date" id="dateStart"></div>
    <div><label>Retour</label><input type="date" id="dateEnd"></div>
  </div>

  <!-- DEPART + DAYS + PERS -->
  <div class="row3">
    <div><label>🏠 Départ</label><input id="depart" value="Bonnelles"></div>
    <div><label>📅 Jours</label><select id="jours"><option value="3">3j</option><option value="5" selected>5j</option><option value="7">7j</option><option value="10">10j</option><option value="14">14j</option></select></div>
    <div><label>👥 Pers</label><select id="pers"><option value="2">2</option><option value="4" selected>4</option><option value="6">6</option></select></div>
  </div>

  <!-- MODE + HEBERGEMENT -->
  <div class="row2">
    <div><label>🔄 Mode</label>
      <select id="mode">
        <option value="itin">Road trip (change/jour)</option>
        <option value="semi" selected>Semi (2-3j/spot)</option>
        <option value="fixe">Camp de base fixe</option>
      </select>
    </div>
    <div><label>⛺ Nuit</label>
      <select id="heberg">
        <option value="bivouac">Bivouac</option>
        <option value="mixte" selected>Mixte</option>
        <option value="camping">Camping</option>
      </select>
    </div>
  </div>

  <!-- ETAPES -->
  <label>➕ Étapes</label>
  <div style="display:flex;gap:3px"><input id="stepInput" placeholder="Ex: Lyon" style="flex:1"><button onclick="addStep()" style="padding:4px 8px;background:var(--border);color:var(--text);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:.72em">+</button></div>
  <div id="stepsList" style="margin-top:1px"></div>

  <!-- ACTIVITES -->
  <h3>🎯 Activités</h3>
  <div id="actCats"></div>

  <button class="btn" onclick="generate()">🔄 GÉNÉRER</button>
  <div class="status" id="status"></div>
</div>

<div class="right">
  <div id="map"></div>
  <div class="preview"><div class="preview-inner" id="trip-preview">Configure ton trip, choisis tes dates → Générer</div></div>
  <div id="budget-preview" style="padding:5px 8px;background:#0d1117;border-top:1px solid var(--border);display:none"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════
// SOURCES — 100% vérifiables, aucun nom inventé
// ═══════════════════════════════════════════════════
// Campings / clubs / viewpoints → OpenStreetMap (Overpass API, licence ODbL)
// Festivals / fêtes → Wikidata (licence CC0)
// Photos → Wikipedia (images réelles)
// Routes → OSRM (OpenStreetMap)
// Géocodage → Nominatim (OpenStreetMap)
// Prix → tarifs marché FR 2026
// ═══════════════════════════════════════════════════

let map, markers=[], steps=[], currentKiff=2;

const KIFF = {
  1:{budget:250,bouffe:12,label:'Éco',emoji:'💸'},
  2:{budget:400,bouffe:15,label:'Cool',emoji:'😎'},
  3:{budget:650,bouffe:22,label:'Kiff',emoji:'🔥'},
  4:{budget:900,bouffe:35,label:'Folie',emoji:'💎'},
};

function setKiff(l){currentKiff=l;document.querySelectorAll('.kiff-card').forEach(c=>c.classList.toggle('active',c.dataset.kiff==l))}
function togglePref(el){el.classList.toggle('active')}

// Set default dates to next weekend
const now=new Date();
const nextFri=new Date(now);nextFri.setDate(now.getDate()+((5-now.getDay()+7)%7||7));
const nextSun=new Date(nextFri);nextSun.setDate(nextFri.getDate()+2);
document.getElementById('dateStart').value=nextFri.toISOString().slice(0,10);
document.getElementById('dateEnd').value=nextSun.toISOString().slice(0,10);

const ACTIVITY_CATEGORIES = {
  "🌊 Eau": [
    {id:'kayak',emoji:'🛶',name:'Kayak/Paddle',price:[15,30],env:['mer','riv','lac']},
    {id:'snorkel',emoji:'🤿',name:'Snorkeling/PMT',price:[0,15],env:['mer']},
    {id:'surf',emoji:'🏄',name:'Surf/Bodyboard',price:[25,45],env:['mer']},
    {id:'voile',emoji:'⛵',name:'Voile/Catamaran',price:[35,60],env:['mer','lac']},
    {id:'canyon',emoji:'💧',name:'Canyoning',price:[35,55],env:['mont','riv']},
    {id:'jetski',emoji:'🛥️',name:'Jet-ski',price:[60,100],env:['mer','lac']},
    {id:'plongee',emoji:'🤿',name:'Plongée',price:[45,80],env:['mer']},
    {id:'baignade',emoji:'🏊',name:'Baignade/Plage',price:[0,0],env:['mer','riv','lac']},
  ],
  "⛰️ Montagne": [
    {id:'escalade',emoji:'🧗',name:'Escalade',price:[30,45],env:['mont']},
    {id:'rando',emoji:'🥾',name:'Rando',price:[0,25],env:['mont','riv','mer']},
    {id:'viaferrata',emoji:'⛓️',name:'Via Ferrata',price:[25,40],env:['mont']},
    {id:'vtt',emoji:'🚵',name:'VTT',price:[25,45],env:['mont','riv']},
    {id:'speleo',emoji:'🕳️',name:'Spéléo',price:[20,35],env:['mont','riv']},
  ],
  "🪂 Air": [
    {id:'parapente',emoji:'🪂',name:'Parapente',price:[75,120],env:['mont','mer']},
    {id:'saut',emoji:'🪂',name:'Parachute',price:[200,300],env:['all']},
    {id:'ulm',emoji:'✈️',name:'Baptême ULM',price:[80,150],env:['all']},
    {id:'helico',emoji:'🚁',name:'Baptême hélico',price:[80,150],env:['all']},
    {id:'montgolfiere',emoji:'🎈',name:'Montgolfière',price:[150,250],env:['all']},
    {id:'acrobranche',emoji:'🌿',name:'Accrobranche',price:[20,30],env:['riv','mont']},
  ],
  "🍷 Détente": [
    {id:'degust',emoji:'🍷',name:'Dégustation vin',price:[15,35],env:['all']},
    {id:'musee',emoji:'🏛️',name:'Musée/Visite',price:[5,15],env:['all']},
    {id:'spa',emoji:'🧖',name:'Spa/Thermal',price:[30,60],env:['all']},
    {id:'equitation',emoji:'🐴',name:'Équitation',price:[25,50],env:['riv','mont']},
    {id:'peche',emoji:'🎣',name:'Pêche',price:[15,30],env:['mer','riv','lac']},
  ],
  "🌙 Nuit": [
    {id:'nightclub',emoji:'🕺',name:'Boîte de nuit',price:[0,15],env:['all']},
    {id:'bar',emoji:'🍸',name:'Bar à cocktails',price:[10,20],env:['all']},
    {id:'concert',emoji:'🎸',name:'Concert',price:[15,40],env:['all']},
  ],
  "📸 Photo/Drone": [
    {id:'viewpoint',emoji:'🌅',name:'Point de vue',price:[0,0],env:['all']},
    {id:'drone',emoji:'🚁',name:'Spot drone',price:[0,0],env:['all']},
    {id:'sunset',emoji:'🌇',name:'Coucher soleil',price:[0,0],env:['mer','mont']},
  ],
};

function buildActivityUI(){
  const c=document.getElementById('actCats');
  let h='';
  for(const[cat,acts]of Object.entries(ACTIVITY_CATEGORIES)){
    h+=`<div class="cat-toggle" onclick="this.nextElementSibling.classList.toggle('open')">▸ ${cat} (${acts.length})</div>`;
    h+=`<div class="cat-body open">`;
    acts.forEach(a=>{h+=`<label class="act-item"><input type="checkbox" id="act_${a.id}" checked>${a.emoji} ${a.name} <span class="act-price">${a.price[0]===a.price[1]?(a.price[0]===0?'gratuit':a.price[0]+'€'):a.price[0]+'-'+a.price[1]+'€'}</span></label>`});
    h+=`</div>`;
  }
  c.innerHTML=h;
}
buildActivityUI();

function getSelectedActs(env){
  const s=[];
  for(const[cat,acts]of Object.entries(ACTIVITY_CATEGORIES)){
    for(const a of acts){
      const cb=document.getElementById('act_'+a.id);
      if(cb&&cb.checked&&(a.env.includes('all')||a.env.includes(env))) s.push(a);
    }
  }
  return s;
}

function addStep(){const inp=document.getElementById('stepInput');const n=inp.value.trim();if(!n)return;steps.push(n);inp.value='';renderSteps()}
function removeStep(i){steps.splice(i,1);renderSteps()}
function renderSteps(){document.getElementById('stepsList').innerHTML=steps.map((s,i)=>`<span>📍${s}<span onclick="removeStep(${i})">×</span></span>`).join('')}

// ═══ MAP ═══
function initMap(){if(map){map.remove();markers=[]}map=L.map('map').setView([46.5,3.5],6);L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'&copy; OSM'}).addTo(map)}
initMap();

function mI(emoji,bg,s){return L.divIcon({html:`<div style="background:${bg};color:#fff;border-radius:50%;width:${s}px;height:${s}px;display:flex;align-items:center;justify-content:center;font-size:${s*.4}px;border:2px solid #0d1117;box-shadow:0 2px 8px rgba(0,0,0,.5)">${emoji}</div>`,iconSize:[s,s],iconAnchor:[s/2,s/2],popupAnchor:[0,-s/2]})}

async function geocode(q){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' France')}&format=json&limit=1`);await sleep(1100);const d=await r.json();if(d.length)return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),name:d[0].display_name.split(',')[0]}}catch(e){}return null}

async function reverseGeocode(lat,lon){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`);await sleep(1100);const d=await r.json();if(d.address)return d.address.city||d.address.town||d.address.village||''}catch(e){}return ''}

async function getRouteOSRM(wpts){
  try{const coords=wpts.map(w=>`${w.lon},${w.lat}`).join(';');const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?geometries=geojson&overview=full`);const d=await r.json();if(!d.routes?.length)return null;return{km:Math.round(d.routes[0].distance/1000),geom:d.routes[0].geometry}}catch(e){return null}}

// ═══ OVERPASS — vraies données OSM ═══
async function queryOSM(bbox,amenity,tourism){
  try{let tag='';if(amenity)tag=`[amenity=${amenity}]`;else if(tourism)tag=`[tourism=${tourism}]`;const q=`[out:json];node(${bbox})${tag};out 25;`;const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',headers:{'Accept':'application/json','Content-Type':'text/plain'},body:'data='+encodeURIComponent(q)});if(!r.ok)return[];const d=await r.json();return d.elements.map(e=>({name:e.tags?.name||'Sans nom',lat:e.lat,lon:e.lon}))}catch(e){return[]}}

function bbox(lat,lon,r=0.1){return `${lat-r},${lon-r},${lat+r},${lon+r}`}

// ═══ WIKIDATA — festivals réels ═══
async function queryFestivals(lat,lon,radiusKm,dateStart,dateEnd){
  try{
    const rDeg=radiusKm/111;
    const q=`SELECT ?event ?eventLabel ?startTime WHERE {
  ?event wdt:P31/wdt:P279* wd:Q132241.
  ?event wdt:P625 ?coords.
  FILTER(CONTAINS(STR(?coords),"Point")).
  BIND(xsd:float(STRBEFORE(STRAFTER(STR(?coords),"Point(")," ")) AS ?lon).
  BIND(xsd:float(STRBEFORE(STRAFTER(STRAFTER(STR(?coords),"Point(")," "),")")) AS ?lat).
  FILTER(?lon >= ${lon-rDeg} && ?lon <= ${lon+rDeg} && ?lat >= ${lat-rDeg} && ?lat <= ${lat+rDeg}).
  OPTIONAL { ?event wdt:P580 ?startTime. }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "fr". }
}
LIMIT 20`;
    const url='https://query.wikidata.org/sparql?format=json&query='+encodeURIComponent(q);
    const r=await fetch(url,{headers:{'Accept':'application/json'}});
    if(!r.ok)return[];
    const d=await r.json();
    return d.results.bindings.map(b=>({
      name:b.eventLabel?.value||'Festival',
      date:b.startTime?.value||null
    }));
  }catch(e){console.error('Wikidata error:',e);return[]}
}

// ═══ WIKIPEDIA IMAGES ═══
const imgCache={};
async function fetchCityImage(city){
  let clean=city.replace(/^(En route|Étape|proche|Spot)\s*/i,'').trim();
  if(!clean||clean.match(/^\d+$/))return null;
  if(imgCache[clean]!==undefined)return imgCache[clean];
  for(const q of[clean,clean+' France',clean.replace(/\s*\(.*\)/,'').trim()]){
    try{const r=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);if(!r.ok)continue;const d=await r.json();let url=null;if(d.originalimage?.source)url=d.originalimage.source;else if(d.thumbnail?.source)url=d.thumbnail.source.replace(/\/\d+px-/,'/800px-');if(url){imgCache[clean]=url;return url}}catch(e){continue}}
  imgCache[clean]=null;return null}

function getEnv(lat,lon){
  if(lon<-1.5&&lat>43&&lat<48)return'mer';if(lon>5&&lat>43&&lat<44.5)return'mer';if(lat>44.5&&lon>6.5)return'mont';if(lat>42.5&&lat<43.5&&lon>2&&lon<7)return'mont';if(lat>45&&lon>6)return'mont';return'riv'}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function avgPrice(a){return Math.round((a.price[0]+a.price[1])/2)}

// ═══ GENERATE ═══
async function generate(){
  const statusEl=document.getElementById('status');
  statusEl.innerHTML='Géocodage<span class="spinner"></span>';

  const departName=document.getElementById('depart').value.trim()||'Bonnelles';
  const destName=document.getElementById('dest').value.trim()||'Cassis';
  const jours=parseInt(document.getElementById('jours').value);
  const pers=parseInt(document.getElementById('pers').value);
  const radius=parseInt(document.getElementById('radius').value);
  const mode=document.getElementById('mode').value;
  const heberg=document.getElementById('heberg').value;
  const kiff=KIFF[currentKiff];
  const budgetMax=kiff.budget;
  const dateStart=document.getElementById('dateStart').value;
  const dateEnd=document.getElementById('dateEnd').value;

  const prefs=[];document.querySelectorAll('.pref-tag.active').forEach(t=>prefs.push(t.dataset.pref));

  // Geocode
  const [depart,dest]=await Promise.all([geocode(departName),geocode(destName)]);
  if(!depart||!dest){statusEl.textContent='❌ Ville introuvable';return}

  let env=getEnv(dest.lat,dest.lon);
  if(prefs.includes('mer')&&!prefs.includes('montagne'))env='mer';
  if(prefs.includes('montagne')&&!prefs.includes('mer'))env='mont';

  // Steps
  const allGeo=[depart];
  for(const s of steps){const g=await geocode(s);if(!g){statusEl.textContent=`❌ "${s}"`;return};allGeo.push(g)}
  allGeo.push(dest);

  statusEl.innerHTML='Calcul route<span class="spinner"></span>';
  const route=await getRouteOSRM(allGeo);
  if(!route){statusEl.textContent='❌ Pas de route';return}
  const kmAllerRetour=route.km*2;

  // Festivals
  statusEl.innerHTML='Recherche festivals<span class="spinner"></span>';
  const festivals=await queryFestivals(dest.lat,dest.lon,Math.min(radius,200),dateStart,dateEnd);
  const festivalData=festivals.filter(f=>f.name).map(f=>f.name);

  const selectedActs=getSelectedActs(env);
  if(!selectedActs.length){statusEl.textContent='❌ Sélectionne au moins 1 activité';return}

  // ═══ BUILD SPOTS ═══
  // Drive to destination: day 1 = travel day (or first 2 days for long trips)
  const driveDays=route.km>600?2:(route.km>300?1:0);
  const exploreDays=jours-driveDays;
  const coords=route.geom.coordinates;

  let spotCoords=[];
  if(mode==='fixe'){
    // Camp base: concentric spots around destination
    const baseR=radius/111;
    for(let i=0;i<Math.min(exploreDays,5);i++){
      const angle=(i/Math.min(exploreDays,5))*Math.PI*2+Math.random()*0.5;
      const r=baseR*(0.25+i*0.15/Math.min(exploreDays,5));
      spotCoords.push({lat:dest.lat+Math.cos(angle)*r,lon:dest.lon+Math.sin(angle)*r});
    }
  }else if(mode==='semi'){
    const nSpots=Math.max(1,Math.ceil(exploreDays/2.5));
    const baseR=radius/111;
    for(let i=0;i<nSpots;i++){
      const angle=(i/nSpots)*Math.PI*2;
      const r=baseR*(0.2+i*0.4/nSpots);
      spotCoords.push({lat:dest.lat+Math.cos(angle)*r,lon:dest.lon+Math.sin(angle)*r});
    }
  }else{
    // Itinérant: spread across route after arriving
    const exploreCoords=coords.slice(Math.floor(coords.length*0.6));
    for(let j=0;j<Math.min(exploreDays,exploreCoords.length);j++){
      const idx=Math.floor(exploreCoords.length*(j+0.5)/exploreDays);
      spotCoords.push({lat:exploreCoords[idx][1],lon:exploreCoords[idx][0]});
    }
  }

  // Add dest itself as a spot
  if(!spotCoords.length)spotCoords.push({lat:dest.lat,lon:dest.lon});

  // Distribute days
  const totalSpots=Math.min(spotCoords.length,exploreDays);
  const daysPerSpot=Array(totalSpots).fill(Math.floor(exploreDays/totalSpots));
  for(let i=0;i<exploreDays%totalSpots;i++)daysPerSpot[i]++;

  // ═══ BUILD DAYS ═══
  let days=[];
  let dayNum=1;
  const nightActs=selectedActs.filter(a=>['nightclub','bar','concert'].includes(a.id));
  const paidActs=selectedActs.filter(a=>!['viewpoint','drone','sunset','nightclub','bar','concert','baignade','rando'].includes(a.id));
  const freeActs=selectedActs.filter(a=>['baignade','rando'].includes(a.id));
  const photoActs=selectedActs.filter(a=>['viewpoint','drone','sunset'].includes(a.id));

  // Drive days
  for(let d=0;d<driveDays;d++){
    const idx=Math.floor(coords.length*(d+0.6)/driveDays);
    days.push({
      day:dayNum,type:'drive',
      name:`En route vers ${dest.name}`,
      lat:coords[Math.min(idx,coords.length-1)][1],
      lon:coords[Math.min(idx,coords.length-1)][0],
      acts:[{emoji:'🚗',name:'Route',price:[0,0]}],
      nightAct:null,
      nuitLabel:heberg==='camping'?'Camping':'Bivouac',
      nuitPrice:heberg==='camping'?14:0,
      drive:true
    });
    dayNum++;
  }

  // Explore days
  for(let s=0;s<totalSpots;s++){
    const n=daysPerSpot[s];
    const spotLat=spotCoords[s].lat+(Math.random()-.5)*0.03;
    const spotLon=spotCoords[s].lon+(Math.random()-.5)*0.03;

    for(let d=0;d<n;d++){
      const isFirstExplore=(dayNum===driveDays+1);
      // Morning act
      let morningAct=null;
      if(paidActs.length){
        const shuf=[...paidActs].sort(()=>Math.random()-.5);
        morningAct=shuf[0];
      }
      if(!morningAct&&freeActs.length)morningAct=freeActs[Math.floor(Math.random()*freeActs.length)];

      // Afternoon act
      let afternoonAct=null;
      const remainPaid=[...paidActs].filter(a=>a.id!==morningAct?.id);
      if(remainPaid.length){
        afternoonAct=remainPaid[Math.floor(Math.random()*remainPaid.length)];
      }else if(freeActs.length){
        afternoonAct=freeActs[Math.floor(Math.random()*freeActs.length)];
      }else if(photoActs.length){
        afternoonAct=photoActs[Math.floor(Math.random()*photoActs.length)];
      }

      // Evening
      const nightAct=nightActs.length?nightActs[Math.floor(Math.random()*nightActs.length)]:null;

      // Photo spot
      const photoAct=photoActs.length?photoActs[Math.floor(Math.random()*photoActs.length)]:null;

      let dayName;
      if(d===0)dayName=dest.name;
      else{
        const rc=await reverseGeocode(spotLat,spotLon);
        dayName=rc||`Spot ${s+1}`;
      }

      days.push({
        day:dayNum,type:'explore',name:dayName,
        lat:spotLat,lon:spotLon,
        morningAct,afternoonAct,nightAct,photoAct,
        nuitLabel:isFirstExplore&&heberg!=='camping'?'Bivouac':(heberg==='bivouac'?'Bivouac':'Camping'),
        nuitPrice:isFirstExplore&&heberg!=='camping'?0:(heberg==='bivouac'?0:14),
        drive:false
      });
      dayNum++;
    }
  }

  // ═══ BUDGET ═══
  const coutVoiture=Math.round(kmAllerRetour*(0.07*1.80+0.06));
  const trajet=Math.round(coutVoiture/pers);
  let actTotal=0;days.forEach(d=>{[d.morningAct,d.afternoonAct,d.nightAct,d.photoAct].filter(Boolean).forEach(a=>actTotal+=avgPrice(a))});
  const nuitTotal=days.reduce((s,d)=>s+d.nuitPrice,0);
  const bouffe=jours*kiff.bouffe;
  let total=trajet+actTotal+nuitTotal+bouffe;

  // Scale up if under budget
  if(total<budgetMax*0.75&&paidActs.length){
    const premiumActs=paidActs.filter(a=>a.price[0]>=50);
    days.filter(d=>!d.drive).forEach(d=>{
      if(total>=budgetMax*0.9)return;
      const pa=premiumActs.length?premiumActs[Math.floor(Math.random()*premiumActs.length)]:paidActs[Math.floor(Math.random()*paidActs.length)];
      const extra=avgPrice(pa);
      if(total+extra<=budgetMax*0.95&&!d.morningAct){
        d.morningAct=pa;total+=extra;
      }
    });
  }

  actTotal=0;days.forEach(d=>{[d.morningAct,d.afternoonAct,d.nightAct,d.photoAct].filter(Boolean).forEach(a=>actTotal+=avgPrice(a))});
  total=trajet+actTotal+nuitTotal+bouffe;

  const budgetPct=Math.round(total/budgetMax*100);
  const barColor=total<=budgetMax?'var(--green)':(total<=budgetMax*1.1?'var(--gold)':'var(--danger)');

  document.getElementById('budget-preview').style.display='block';
  document.getElementById('budget-preview').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
      <b style="font-size:.8em">💰 ${total}€/pers · ${kiff.emoji} ${kiff.label}</b>
      <span style="font-size:.66em;color:${barColor}">${budgetPct}%${total<=budgetMax?' ✅':''}</span>
    </div>
    <div class="budget-bar"><div class="budget-bar-inner" style="width:${Math.min(100,budgetPct)}%;background:${barColor}"></div></div>
    <div class="budget-line"><span>⛽🛣️ Trajet A/R (${kmAllerRetour}km · ${coutVoiture}€ voiture)</span><span>${trajet}€/pers</span></div>
    <div class="budget-line"><span>🎯 Activités</span><span>${actTotal}€</span></div>
    <div class="budget-line"><span>⛺ Nuits</span><span>${nuitTotal}€</span></div>
    <div class="budget-line"><span>🍽️ Bouffe (${jours}j × ${kiff.bouffe}€)</span><span>${bouffe}€</span></div>
  `;

  // ═══ POIs & IMAGES ═══
  statusEl.innerHTML='Recherche lieux réels<span class="spinner"></span>';

  const uniqueSpots=[];const seen=new Set();
  days.forEach(d=>{const k=`${d.lat.toFixed(3)},${d.lon.toFixed(3)}`;if(!seen.has(k)){seen.add(k);uniqueSpots.push(d)}});

  const searchR=radius>100?0.4:(radius>50?0.25:0.1);
  const poiPromises=uniqueSpots.map(async d=>{
    const bb=bbox(d.lat,d.lon,searchR);
    const [campings,clubs,viewpoints]=await Promise.all([
      queryOSM(bb,null,'camp_site'),
      queryOSM(bb,'nightclub',null),
      queryOSM(bb,null,'viewpoint'),
    ]);
    return{key:`${d.lat.toFixed(3)},${d.lon.toFixed(3)}`,campings,clubs,viewpoints};
  });

  const imgPromises=days.map(async d=>{
    let city=d.name;if(city.match(/^(En route|Étape|Spot)/i)||city.includes('Départ')){const rc=await reverseGeocode(d.lat,d.lon);if(rc)city=rc}
    return{day:d.day,img:await fetchCityImage(city)};
  });

  const [poiResults,imgResults]=await Promise.all([Promise.all(poiPromises),Promise.all(imgPromises)]);

  const poiMap={};poiResults.forEach(p=>{poiMap[p.key]=p});
  const imgMap={};imgResults.forEach(r=>{imgMap[r.day]=r.img});

  days.forEach(d=>{
    const k=`${d.lat.toFixed(3)},${d.lon.toFixed(3)}`;const pois=poiMap[k];
    if(pois){d.campings=(pois.campings||[]).filter(c=>c.name!=='Sans nom');d.clubs=(pois.clubs||[]).filter(c=>c.name!=='Sans nom');d.viewpoints=(pois.viewpoints||[]).filter(v=>v.name!=='Sans nom')}
  });

  // Night logistics: for days with nightclubs, find nearby camping/bivouac
  days.forEach(d=>{
    if(d.nightAct&&d.nightAct.id==='nightclub'&&d.clubs?.length){
      const club=d.clubs[0];
      // Check distance to camping
      if(d.campings?.length){
        const nearestCamp=d.campings[0];
        d.sleepNearClub=`⛺ ${nearestCamp.name} (à proximité de 🕺 ${club.name})`;
      }
    }
  });

  statusEl.innerHTML=`✅ ${driveDays>0?driveDays+'j route + ':''}${exploreDays}j exploration · ${uniqueSpots.length} spots · ${festivalData.length} festivals <span class="badge badge-osm">OSM</span><span class="badge badge-fest">Wiki</span>`;
  statusEl.style.color='var(--green)';

  // ═══ RENDER ═══
  const destImg=imgMap[days.length]||imgMap[days.findLast(d=>imgMap[d.day])?.day];
  let html='';
  if(destImg){html+=`<div class="hero-wrap"><img class="hero-img" src="${destImg}" alt="${dest.name}" loading="lazy" onerror="this.parentElement.style.display='none'"><div class="hero-overlay"><b>${depart.name} → ${dest.name}</b> · ${jours}j · ${pers} pers · ${kiff.emoji} ${kiff.label} · ${dateStart}→${dateEnd}</div></div>`}
  else html+=`<div style="padding:2px 6px"><b>${depart.name} → ${dest.name}</b> · ${jours}j · ${pers} pers · ${dateStart}→${dateEnd}</div>`;

  // Festivals alert
  if(festivalData.length){html+=`<div style="padding:3px 8px;margin:2px 4px;background:rgba(188,140,255,.08);border:1px solid rgba(188,140,255,.2);border-radius:6px;font-size:.68em">🎪 <b>Festivals pendant ton séjour :</b> ${festivalData.slice(0,5).map(f=>`<span class="festival-tag">${f}</span>`).join(' ')} <span class="badge badge-fest">Wikidata</span></div>`}

  days.forEach(d=>{
    const img=imgMap[d.day];
    const color=COLORS[(d.day-1)%COLORS.length];
    html+=`<div class="day-card">`;
    html+=`<div class="day-card-h" style="color:${color}">${d.drive?'🚗':((d.nightAct?.id==='nightclub'?'🕺':'📍'))} J${d.day} — ${d.name} ${d.drive?'(trajet)':''}</div>`;
    html+=`<div class="day-card-b">`;
    if(img)html+=`<img class="day-img" src="${img}" alt="${d.name}" loading="lazy" onerror="this.style.display='none'">`;
    else html+=`<div class="day-img" style="display:flex;align-items:center;justify-content:center;font-size:1.3em">${d.drive?'🚗':'🗺️'}</div>`;
    html+=`<div class="day-info">`;

    if(d.drive){
      html+=`<div class="day-sec matin">🚗 Trajet — ${route.km}km jusqu'à ${dest.name}</div>`;
    }else{
      if(d.morningAct)html+=`<div class="day-sec matin">🌅 Matin : ${d.morningAct.emoji} ${d.morningAct.name} (~${avgPrice(d.morningAct)}€)</div>`;
      if(d.afternoonAct)html+=`<div class="day-sec aprem">☀️ Aprèm : ${d.afternoonAct.emoji} ${d.afternoonAct.name} (~${avgPrice(d.afternoonAct)}€)</div>`;
      if(d.photoAct)html+=`<div class="day-sec aprem">📸 ${d.photoAct.emoji} ${d.photoAct.name}</div>`;
      if(d.nightAct)html+=`<div class="day-sec soir">🌙 Soir : ${d.nightAct.emoji} ${d.nightAct.name} (~${avgPrice(d.nightAct)}€)</div>`;
      if(d.sleepNearClub)html+=`<div class="day-sec dodo">${d.sleepNearClub}</div>`;
      else html+=`<div class="day-sec dodo">⛺ ${d.nuitLabel} · ${d.nuitPrice}€</div>`;
    }

    if(d.campings?.length||d.clubs?.length||d.viewpoints?.length){
      html+=`<div style="font-size:.92em;color:var(--muted);margin-top:2px">`;
      if(d.campings?.length)html+=`⛺ ${d.campings.slice(0,2).map(c=>c.name).join(', ')}<br>`;
      if(d.clubs?.length)html+=`🕺 ${d.clubs.slice(0,2).map(c=>c.name).join(', ')}<br>`;
      if(d.viewpoints?.length)html+=`📸 ${d.viewpoints.slice(0,2).map(v=>v.name).join(', ')}`;
      html+=`</div>`;
    }
    html+=`</div></div></div>`;
  });

  document.getElementById('trip-preview').innerHTML=html;

  // ═══ MAP ═══
  markers.forEach(m=>map.removeLayer(m));markers=[];
  map.eachLayer(l=>{if(l instanceof L.GeoJSON||(!l._url&&l instanceof L.Marker&&!l._path))map.removeLayer(l)});
  L.geoJSON(route.geom,{style:{color:'var(--accent)',weight:3,opacity:.35,dashArray:'8,6'}}).addTo(map);
  if(mode==='fixe')L.circle([dest.lat,dest.lon],{radius:radius*1000,color:'var(--gold)',weight:1,opacity:.3,fillOpacity:.04,dashArray:'4,4'}).addTo(map);

  markers.push(L.marker([depart.lat,depart.lon],{icon:mI('🚗','var(--accent)',28)}).bindPopup(`<b>🚗 DÉPART</b><br>${depart.name}`).addTo(map));
  for(let i=1;i<allGeo.length-1;i++)markers.push(L.marker([allGeo[i].lat,allGeo[i].lon],{icon:mI('📍','var(--gold)',20)}).bindPopup(`<b>ÉTAPE</b><br>${allGeo[i].name}`).addTo(map));

  days.forEach(d=>{
    const c=COLORS[(d.day-1)%COLORS.length];
    const img=imgMap[d.day];
    let pc=`<b>J${d.day} — ${d.name}</b>`;
    if(d.morningAct)pc+=`<br>🌅 ${d.morningAct.emoji} ${d.morningAct.name}`;
    if(d.afternoonAct)pc+=`<br>☀️ ${d.afternoonAct.emoji} ${d.afternoonAct.name}`;
    if(d.nightAct)pc+=`<br>🌙 ${d.nightAct.emoji} ${d.nightAct.name}`;
    if(d.campings?.length)pc+=`<br>⛺ ${d.campings.slice(0,2).map(c=>c.name).join(', ')}`;
    if(img)pc+=`<br><img src="${img}" style="width:150px;border-radius:6px;margin-top:3px" loading="lazy">`;
    markers.push(L.marker([d.lat,d.lon],{icon:mI(d.day.toString(),c,22)}).bindPopup(pc,{maxWidth:240}).addTo(map));
  });

  const bounds=L.latLngBounds(allGeo.map(g=>[g.lat,g.lon]));
  map.fitBounds(bounds,{padding:[40,40]});
  document.querySelector('.preview').scrollTop=0;
}

const COLORS=['#58a6ff','#f78166','#d2a850','#3fb950','#bc8cff','#f0883e','#79c0ff','#ff7b72','#56d364','#e3b341','#a371f7','#db6d28','#2ea043','#d55b8e'];
</script>
</body>
</html>
